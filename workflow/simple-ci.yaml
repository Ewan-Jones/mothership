name: simple-ci
version: '1.0'
description: simple test for reference and agent node
defaults:
  retry: 1
  timeout: 120
references:
  setup: ./setup.yml
  copy-workspace: ./copy-workspace.yaml
nodes:
  - id: do-setup
    type: reference
    ref: setup
  - id: copy-workspace
    type: reference
    depends:
      - do-setup
    ref: copy-workspace
    with:
      copyDir: ./.agent
      outputDir: ./.tmp
  - id: agent-run
    type: agent
    depends:
      - copy-workspace
    prompt: 使用 bash cwd 一下
    agent: opencode
    cwd: '{{ needs.copy-workspace.outputs.workdir }}'
